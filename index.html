<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>ひらがな かきじゅん おけいこ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;}
body{font-family:'Zen Maru Gothic',sans-serif;background:linear-gradient(160deg,#FFF0F5 0%,#F0F4FF 50%,#F0FFF8 100%);min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
.deco{position:fixed;pointer-events:none;font-size:1.6rem;opacity:0.13;animation:fd ease-in-out infinite alternate;}
@keyframes fd{from{transform:translateY(0) rotate(-8deg)}to{transform:translateY(-16px) rotate(8deg)}}
.app{width:100%;max-width:480px;padding:14px 14px 60px;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;z-index:10;}
header{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.logo{background:white;border-radius:18px;padding:9px 16px;box-shadow:0 4px 0 #FFB7C5,0 6px 14px rgba(255,150,180,0.18);flex:1;}
.logo-title{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#FF8FAB,#C39BD3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:0.65rem;color:#bbb;}
.done-badge{background:white;border-radius:18px;padding:8px 13px;box-shadow:0 4px 0 #D9B8FF,0 6px 12px rgba(180,140,230,0.2);text-align:center;white-space:nowrap;}
.done-badge span{font-size:0.6rem;color:#ddd;display:block;}
.done-badge strong{font-size:1.2rem;color:#C39BD3;}
.mascot-area{position:relative;height:60px;display:flex;align-items:center;justify-content:center;width:100%;}
.mascot{font-size:3rem;animation:bob 2.4s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.bubble{position:absolute;left:calc(50% + 26px);top:4px;background:white;border-radius:14px;padding:6px 12px;font-size:0.82rem;font-weight:700;color:#777;box-shadow:0 3px 10px rgba(0,0,0,0.1);opacity:0;transform:scale(0.85) translateX(-6px);transition:all 0.3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:180px;white-space:normal;text-align:center;}
.bubble.show{opacity:1;transform:scale(1) translateX(0);}
.bubble::before{content:'';position:absolute;left:-7px;top:50%;transform:translateY(-50%);border:7px solid transparent;border-right-color:white;border-left:none;}
.main-card{width:100%;background:white;border-radius:26px;padding:16px;box-shadow:0 6px 0 #FFB7C5,0 10px 26px rgba(255,140,170,0.14);display:flex;flex-direction:column;align-items:center;gap:11px;}
.info-bar{display:flex;align-items:center;justify-content:center;gap:14px;width:100%;}
.big-letter{font-size:4rem;font-weight:900;color:#E8A0B8;text-shadow:0 4px 0 #FFD6E4;min-width:80px;text-align:center;animation:popIn 0.4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0.5) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.letter-meta{display:flex;flex-direction:column;gap:5px;}
.reading-badge{background:#FFEAA7;border-radius:11px;padding:5px 13px;font-size:0.95rem;font-weight:700;color:#c8860a;}
.word-example{background:#B5EAD7;border-radius:11px;padding:5px 13px;font-size:0.84rem;font-weight:700;color:#2d8c6a;}
.stroke-badge{background:#EEE8FF;border-radius:11px;padding:5px 13px;font-size:0.78rem;font-weight:700;color:#9B72CF;text-align:center;}
.mode-tabs{display:flex;gap:6px;width:100%;}
.mode-tab{flex:1;border:none;border-radius:13px;padding:8px 3px;font-family:'Zen Maru Gothic',sans-serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.2s;background:#F5F0FF;color:#B0A0CC;box-shadow:0 3px 0 #DDD;}
.mode-tab.active{background:linear-gradient(135deg,#FF8FAB,#C39BD3);color:white;box-shadow:0 3px 0 #A06CB0;}
.mode-tab:active{transform:translateY(2px);}
.stroke-progress{display:flex;gap:5px;justify-content:center;min-height:18px;align-items:center;}
.stroke-pip{width:24px;height:7px;border-radius:4px;background:#EEE;transition:background 0.3s;}
.stroke-pip.done{background:linear-gradient(90deg,#FF8FAB,#C39BD3);}
.stroke-pip.active{background:#FFD700;}
/* キャンバスエリア */
.canvas-wrap{width:100%;position:relative;}
.canvas-box{position:relative;width:100%;aspect-ratio:1;border-radius:20px;overflow:hidden;box-shadow:0 4px 0 #E8D0F0,0 6px 18px rgba(180,140,220,0.15);background:#FAF5FF;}
.canvas-box::before{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(rgba(200,170,240,0.3) 1px,transparent 1px),linear-gradient(90deg,rgba(200,170,240,0.3) 1px,transparent 1px),linear-gradient(rgba(200,170,240,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(200,170,240,0.1) 1px,transparent 1px);background-size:50% 50%,50% 50%,25% 25%,25% 25%;}
.canvas-box::after{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(rgba(200,170,240,0.4),rgba(200,170,240,0.4)) center/2px 100% no-repeat,linear-gradient(rgba(200,170,240,0.4),rgba(200,170,240,0.4)) center/100% 2px no-repeat;}
/* アニメ用・ガイド用・練習用の3枚のcanvas */
#animCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
#guideCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none;}
#drawCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:4;cursor:crosshair;touch-action:none;}
/* 書き始め番号 */
.num-dot{position:absolute;z-index:6;pointer-events:none;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:900;color:white;transform:translate(-50%,-50%) scale(0);transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.num-dot.show{transform:translate(-50%,-50%) scale(1);}
.mode-hint{font-size:0.72rem;color:#bbb;text-align:center;}
.mode-hint b{color:#FF8FAB;}
.color-row{display:flex;gap:7px;justify-content:center;align-items:center;flex-wrap:wrap;}
.color-label{font-size:0.68rem;color:#ccc;width:100%;text-align:center;}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s;box-shadow:0 2px 5px rgba(0,0,0,0.12);}
.color-dot:hover{transform:scale(1.15);}
.color-dot.active{border-color:#333;transform:scale(1.2);}
.btn-row{display:flex;gap:7px;width:100%;}
.btn{flex:1;border:none;border-radius:15px;padding:12px 5px;font-family:'Zen Maru Gothic',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:4px;}
.btn:active{transform:translateY(3px);}
.btn-clear{background:white;color:#CC99BB;box-shadow:0 4px 0 #EED4E8;}
.btn-clear:hover{background:#FFF0F9;}
.btn-ok{background:linear-gradient(135deg,#B5EAD7,#7EC8A4);color:#2d8c6a;box-shadow:0 4px 0 #5BA880;}
.btn-ok:hover{filter:brightness(1.06);transform:translateY(-1px);}
.btn-next{background:linear-gradient(135deg,#FF8FAB,#C39BD3);color:white;box-shadow:0 4px 0 #A06CB0;}
.btn-next:hover{filter:brightness(1.06);transform:translateY(-1px);}
.btn-next:active{box-shadow:0 1px 0 #A06CB0;}
.hanamaru-overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,230,245,0.7);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.3s;}
.hanamaru-overlay.show{opacity:1;pointer-events:all;}
.hanamaru-stamp{font-size:7rem;animation:stampIn 0.5s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 8px 16px rgba(255,100,150,0.4));}
.hanamaru-msg{font-size:1.7rem;font-weight:900;color:#FF8FAB;margin-top:12px;animation:stampIn 0.5s 0.1s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes stampIn{from{transform:scale(0.2) rotate(-30deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.petal{position:fixed;pointer-events:none;z-index:300;animation:pf linear forwards;}
@keyframes pf{0%{transform:translateY(-30px) rotate(0) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(540deg) scale(0.5);opacity:0}}
.nav-strip{width:100%;background:white;border-radius:18px;padding:11px 14px;box-shadow:0 4px 12px rgba(200,150,220,0.1);}
.nav-label{font-size:0.68rem;color:#ccc;margin-bottom:7px;}
.nav-chars{display:flex;gap:5px;flex-wrap:wrap;}
.nav-char{width:32px;height:32px;border-radius:9px;background:#FAF5FF;border:2px solid #E8D8F8;font-size:1rem;font-weight:700;color:#C39BD3;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;position:relative;}
.nav-char:hover{background:#D9B8FF;color:white;transform:scale(1.1);}
.nav-char.active{background:linear-gradient(135deg,#FF8FAB,#C39BD3);color:white;border-color:transparent;}
.nav-char.done::after{content:'✓';position:absolute;top:-5px;right:-5px;background:#B5EAD7;color:#2d8c6a;font-size:0.52rem;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;}
</style>

const STROKE_COLORS=['#FF6B9D','#FF9F43','#26de81','#4BCFFA','#A55EEA','#FC5C65','#FFD700'];
const PEN_COLORS=['#FF8FAB','#A78BFA','#34D399','#60A5FA','#F97316','#1E1B4B'];
const MASCOTS=['🐰','🐼','🦊','🐸','🐨','🦁'];

// ===== 状態 =====

// ===== Canvas =====
let animCtx, guideCtx, drawCtx;

function initCanvases(){
  const box=document.getElementById('canvasBox');
  sz=box.offsetWidth;
  ['animCanvas','guideCanvas','drawCanvas'].forEach(id=>{

  drawCtx.lineWidth=Math.max(14,sz/22);
  drawCtx.strokeStyle=currentColor;

  const dc=document.getElementById('drawCanvas');
  dc.addEventListener('mousedown',onDown);
  dc.addEventListener('mousemove',onMove);
  dc.addEventListener('mouseup',onUp);
  dc.addEventListener('mouseleave',onUp);
  dc.addEventListener('touchstart',e=>{e.preventDefault();onDown(e.touches[0]);},{passive:false});
  dc.addEventListener('touchmove',e=>{e.preventDefault();onMove(e.touches[0]);},{passive:false});
  dc.addEventListener('touchend',onUp);
}

function getPos(e){
  const r=document.getElementById('drawCanvas').getBoundingClientRect();
  return{x:(e.clientX-r.left)*(sz/r.width),y:(e.clientY-r.top)*(sz/r.height)};
}
function onDown(e){drawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;drawCtx.beginPath();drawCtx.arc(p.x,p.y,drawCtx.lineWidth/2,0,Math.PI*2);drawCtx.fillStyle=currentColor;drawCtx.fill();}
function onMove(e){if(!drawing)return;const p=getPos(e);drawCtx.beginPath();drawCtx.moveTo(lastX,lastY);drawCtx.lineTo(p.x,p.y);drawCtx.strokeStyle=currentColor;drawCtx.stroke();lastX=p.x;lastY=p.y;}
function onUp(){drawing=false;}
function clearDraw(){drawCtx.clearRect(0,0,sz,sz);showBubble('もういちど かいてみよう😊',false);}

// ===== SVGパスをCanvasに描く（Path2D不使用・iOS対応）=====
function strokePath(ctx, d, sc){
  // dはviewBox 109x109 → sz×sz にスケール済みの文字列を受け取る
  const scale=sc||1;
  const cmds=d.match(/[MmCcLlHhVvSsQqTtZz][^MmCcLlHhVvSsQqTtZz]*/g)||[];
  let cx=0,cy=0;
  ctx.beginPath();
  cmds.forEach(cmd=>{
    const t=cmd[0];
    const ns=(cmd.slice(1).match(/-?[0-9]*\.?[0-9]+/g)||[]).map(Number);
    let i=0;
    const go=()=>i<ns.length;
    if(t==='M'){while(go()){cx=ns[i]*scale;cy=ns[i+1]*scale;ctx.moveTo(cx,cy);i+=2;}}
    else if(t==='m'){while(go()){cx+=ns[i]*scale;cy+=ns[i+1]*scale;ctx.moveTo(cx,cy);i+=2;}}
    else if(t==='L'){while(go()){cx=ns[i]*scale;cy=ns[i+1]*scale;ctx.lineTo(cx,cy);i+=2;}}
    else if(t==='l'){while(go()){cx+=ns[i]*scale;cy+=ns[i+1]*scale;ctx.lineTo(cx,cy);i+=2;}}
    else if(t==='H'){while(go()){cx=ns[i]*scale;ctx.lineTo(cx,cy);i+=1;}}
    else if(t==='h'){while(go()){cx+=ns[i]*scale;ctx.lineTo(cx,cy);i+=1;}}
    else if(t==='V'){while(go()){cy=ns[i]*scale;ctx.lineTo(cx,cy);i+=1;}}
    else if(t==='v'){while(go()){cy+=ns[i]*scale;ctx.lineTo(cx,cy);i+=1;}}
    else if(t==='C'){while(go()){ctx.bezierCurveTo(ns[i]*scale,ns[i+1]*scale,ns[i+2]*scale,ns[i+3]*scale,ns[i+4]*scale,ns[i+5]*scale);cx=ns[i+4]*scale;cy=ns[i+5]*scale;i+=6;}}
    else if(t==='c'){while(go()){ctx.bezierCurveTo((cx+ns[i]*scale),(cy+ns[i+1]*scale),(cx+ns[i+2]*scale),(cy+ns[i+3]*scale),(cx+ns[i+4]*scale),(cy+ns[i+5]*scale));cx+=ns[i+4]*scale;cy+=ns[i+5]*scale;i+=6;}}
    else if(t==='S'){while(go()){ctx.bezierCurveTo(cx,cy,ns[i]*scale,ns[i+1]*scale,ns[i+2]*scale,ns[i+3]*scale);cx=ns[i+2]*scale;cy=ns[i+3]*scale;i+=4;}}
    else if(t==='s'){while(go()){ctx.bezierCurveTo(cx,cy,(cx+ns[i]*scale),(cy+ns[i+1]*scale),(cx+ns[i+2]*scale),(cy+ns[i+3]*scale));cx+=ns[i+2]*scale;cy+=ns[i+3]*scale;i+=4;}}
    else if(t==='Q'){while(go()){ctx.quadraticCurveTo(ns[i]*scale,ns[i+1]*scale,ns[i+2]*scale,ns[i+3]*scale);cx=ns[i+2]*scale;cy=ns[i+3]*scale;i+=4;}}
    else if(t==='q'){while(go()){ctx.quadraticCurveTo((cx+ns[i]*scale),(cy+ns[i+1]*scale),(cx+ns[i+2]*scale),(cy+ns[i+3]*scale));cx+=ns[i+2]*scale;cy+=ns[i+3]*scale;i+=4;}}
    else if(t==='Z'||t==='z'){ctx.closePath();}
  });
}

// ===== アニメーション（requestAnimationFrame で Canvas に直接描く）=====
function playAnim(){
  // タイマー・RAF停止
  stopAll();
  animating=true;

  // アニメcanvasクリア
  animCtx.clearRect(0,0,sz,sz);
  guideCtx.clearRect(0,0,sz,sz);
  drawCtx.clearRect(0,0,sz,sz);
  clearNumDots();

  const scale=sz/SVG_SIZE;
  const ch=CHARS[CHAR_KEYS[currentIdx]];
  const strokes=ch.s;

  // 全画をアニメcanvasに薄く描く（ゴースト）
  strokes.forEach((d,i)=>{
    animCtx.save();
    animCtx.globalAlpha=0.08;
    animCtx.strokeStyle=STROKE_COLORS[i%STROKE_COLORS.length];
    animCtx.lineWidth=Math.max(14,sz/20);
    animCtx.lineCap='round'; animCtx.lineJoin='round';
    strokePath(animCtx, d, scale);
    animCtx.stroke();
    animCtx.restore();
  });

  // 各ストロークを順番にアニメ
  let strokeIdx=0;

  function nextStroke(){
    if(!animating) return;
    if(strokeIdx>=strokes.length){
      // 全完了
      animating=false;
      showBubble('みた？じぶんでも かいてみよう！✏️',true);
      previewTimer=setTimeout(()=>setMode('practice'),1500);
      return;
    }

    const d=strokes[strokeIdx];
    const color=STROKE_COLORS[strokeIdx%STROKE_COLORS.length];
    const lw=Math.max(14,sz/20);

    // 書き始め番号ドット
    addNumDot(strokeIdx, d, color, scale);
    updatePips(strokeIdx, strokes.length);

    // このストロークの点列を生成
    const pts=getPathPoints(d, scale);
    let pi=0;
    const totalPts=pts.length;
    const STROKE_MS=700;
    const ptsPerMs=totalPts/STROKE_MS;
    let lastTime=null;

    function drawStep(ts){
      if(!animating) return;
      if(lastTime===null) lastTime=ts;
      const elapsed=ts-lastTime;
      lastTime=ts;
      const add=Math.max(1,Math.round(ptsPerMs*elapsed));

      animCtx.save();
      animCtx.strokeStyle=color;
      animCtx.lineWidth=lw;
      animCtx.lineCap='round'; animCtx.lineJoin='round';
      animCtx.globalAlpha=1;
      for(let k=0;k<add&&pi<totalPts-1;k++,pi++){
        animCtx.beginPath();
        animCtx.moveTo(pts[pi].x,pts[pi].y);
        animCtx.lineTo(pts[pi+1].x,pts[pi+1].y);
        animCtx.stroke();
      }
      animCtx.restore();

      if(pi<totalPts-1){
        rafId=requestAnimationFrame(drawStep);
      } else {
        // このストローク完了 → 少し間を置いて次へ
        strokeIdx++;
        animTimers.push(setTimeout(nextStroke, 280));
      }
    }
    rafId=requestAnimationFrame(drawStep);
  }

  nextStroke();
}

// SVGパスdを点列に変換（ベジェ補間）
function getPathPoints(d, scale){
  const cmds=d.match(/[MmCcLlHhVvSsQqTtZz][^MmCcLlHhVvSsQqTtZz]*/g)||[];
  const pts=[];
  let cx=0,cy=0,px=0,py=0;

  function addPt(x,y){pts.push({x:x*scale,y:y*scale});}
  function cubicBez(x0,y0,x1,y1,x2,y2,x3,y3){
    const n=Math.ceil(Math.sqrt((x3-x0)**2+(y3-y0)**2)*scale/3)+8;
    for(let i=0;i<=n;i++){
      const t=i/n,u=1-t;
      addPt(u**3*x0+3*u**2*t*x1+3*u*t**2*x2+t**3*x3,
            u**3*y0+3*u**2*t*y1+3*u*t**2*y2+t**3*y3);
    }
  }
  function quadBez(x0,y0,x1,y1,x2,y2){
    const n=Math.ceil(Math.sqrt((x2-x0)**2+(y2-y0)**2)*scale/3)+6;
    for(let i=0;i<=n;i++){
      const t=i/n,u=1-t;
      addPt(u**2*x0+2*u*t*x1+t**2*x2, u**2*y0+2*u*t*y1+t**2*y2);
    }
  }

  cmds.forEach(cmd=>{
    const t=cmd[0];
    const ns=(cmd.slice(1).match(/-?[0-9]*\.?[0-9]+/g)||[]).map(Number);
    let i=0;
    if(t==='M'){while(i<ns.length){cx=ns[i];cy=ns[i+1];addPt(cx,cy);px=cx;py=cy;i+=2;}}
    else if(t==='m'){while(i<ns.length){cx+=ns[i];cy+=ns[i+1];addPt(cx,cy);px=cx;py=cy;i+=2;}}
    else if(t==='L'){while(i<ns.length){cx=ns[i];cy=ns[i+1];addPt(cx,cy);i+=2;}}
    else if(t==='l'){while(i<ns.length){cx+=ns[i];cy+=ns[i+1];addPt(cx,cy);i+=2;}}
    else if(t==='H'){while(i<ns.length){cx=ns[i];addPt(cx,cy);i++;}}
    else if(t==='h'){while(i<ns.length){cx+=ns[i];addPt(cx,cy);i++;}}
    else if(t==='V'){while(i<ns.length){cy=ns[i];addPt(cx,cy);i++;}}
    else if(t==='v'){while(i<ns.length){cy+=ns[i];addPt(cx,cy);i++;}}
    else if(t==='C'){while(i<ns.length){cubicBez(cx,cy,ns[i],ns[i+1],ns[i+2],ns[i+3],ns[i+4],ns[i+5]);px=ns[i+2];py=ns[i+3];cx=ns[i+4];cy=ns[i+5];i+=6;}}
    else if(t==='c'){while(i<ns.length){cubicBez(cx,cy,cx+ns[i],cy+ns[i+1],cx+ns[i+2],cy+ns[i+3],cx+ns[i+4],cy+ns[i+5]);px=cx+ns[i+2];py=cy+ns[i+3];cx+=ns[i+4];cy+=ns[i+5];i+=6;}}
    else if(t==='S'){while(i<ns.length){cubicBez(cx,cy,2*cx-px,2*cy-py,ns[i],ns[i+1],ns[i+2],ns[i+3]);px=ns[i];py=ns[i+1];cx=ns[i+2];cy=ns[i+3];i+=4;}}
    else if(t==='s'){while(i<ns.length){cubicBez(cx,cy,2*cx-px,2*cy-py,cx+ns[i],cy+ns[i+1],cx+ns[i+2],cy+ns[i+3]);px=cx+ns[i];py=cy+ns[i+1];cx+=ns[i+2];cy+=ns[i+3];i+=4;}}
    else if(t==='Q'){while(i<ns.length){quadBez(cx,cy,ns[i],ns[i+1],ns[i+2],ns[i+3]);px=ns[i];py=ns[i+1];cx=ns[i+2];cy=ns[i+3];i+=4;}}
    else if(t==='q'){while(i<ns.length){quadBez(cx,cy,cx+ns[i],cy+ns[i+1],cx+ns[i+2],cy+ns[i+3]);px=cx+ns[i];py=cy+ns[i+1];cx+=ns[i+2];cy+=ns[i+3];i+=4;}}
  });
  return pts;
}

// ===== ガイド（薄いお手本）をguideCanvasに描く =====
function drawGuide(){
  const scale=sz/SVG_SIZE;
  const ch=CHARS[CHAR_KEYS[currentIdx]];
  guideCtx.clearRect(0,0,sz,sz);
  ch.s.forEach((d,i)=>{
    guideCtx.save();
    guideCtx.globalAlpha=0.15;
    guideCtx.strokeStyle=STROKE_COLORS[i%STROKE_COLORS.length];
    guideCtx.lineWidth=Math.max(14,sz/20);
    guideCtx.lineCap='round'; guideCtx.lineJoin='round';
    strokePath(guideCtx, d, scale);
    guideCtx.stroke();
    guideCtx.restore();
  });
}

// ===== モード管理 =====
function setMode(m){
  stopAll();
  mode=m;

  // タブ
  document.getElementById('tabWatch').classList.toggle('active',m==='watch');
  document.getElementById('tabGuide').classList.toggle('active',m==='guide');
  document.getElementById('tabPractice').classList.toggle('active',m==='practice');

  // 番号ドット消去
  clearNumDots();

  if(m==='watch'){
    animCtx.clearRect(0,0,sz,sz);
    guideCtx.clearRect(0,0,sz,sz);
    drawCtx.clearRect(0,0,sz,sz);
    document.getElementById('modeHint').innerHTML='👀 かきじゅんを みてね！';
    playAnim();
  } else if(m==='guide'){
    animCtx.clearRect(0,0,sz,sz);
    drawCtx.clearRect(0,0,sz,sz);
    drawGuide();
    document.getElementById('modeHint').innerHTML='📖 <b>おてほんを みながら</b> かいてみよう！';
  } else {
    animCtx.clearRect(0,0,sz,sz);
    guideCtx.clearRect(0,0,sz,sz);
    drawCtx.clearRect(0,0,sz,sz);
    document.getElementById('modeHint').innerHTML='✏️ <b>じぶんで</b> かいてみよう！';
  }
}

// ===== 全停止 =====
function stopAll(){
  animating=false;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  animTimers.forEach(t=>clearTimeout(t));
  animTimers=[];
  if(previewTimer){clearTimeout(previewTimer);previewTimer=null;}
}

// ===== 番号ドット =====
function addNumDot(si, d, color, scale){
  // パスの始点を取得
  const m=d.match(/[Mm]\s*(-?[0-9]*\.?[0-9]+)[,\s]+(-?[0-9]*\.?[0-9]+)/);
  if(!m) return;
  let x=parseFloat(m[1]), y=parseFloat(m[2]);
  if(d[0]==='m'){x+=0;y+=0;} // 相対の場合は0,0から
  const pct_x=Math.max(5,Math.min(93,(x/SVG_SIZE)*100));
  const pct_y=Math.max(5,Math.min(93,(y/SVG_SIZE)*100));

  const box=document.getElementById('canvasBox');
  const dot=document.createElement('div');
  dot.className='num-dot';
  dot.textContent=si+1;
  dot.style.left=pct_x+'%';
  dot.style.top=pct_y+'%';
  dot.style.background=color;
  box.appendChild(dot);
  requestAnimationFrame(()=>dot.classList.add('show'));
}
function clearNumDots(){document.querySelectorAll('.num-dot').forEach(d=>d.remove());}

// ===== プログレスバー =====
function buildPips(n){
  const bar=document.getElementById('strokeProgress');
  bar.innerHTML='';
  for(let i=0;i<n;i++){const p=document.createElement('div');p.className='stroke-pip';bar.appendChild(p);}
}
function updatePips(done,total){
  const pips=document.querySelectorAll('.stroke-pip');
  pips.forEach((p,i)=>{
    p.classList.remove('done','active');
    if(i<done) p.classList.add('done');
    else if(i===done) p.classList.add('active');
  });
}

// ===== 文字切替 =====
function goTo(idx){
  stopAll();
  currentIdx=idx;
  const key=CHAR_KEYS[idx];
  const ch=CHARS[key];

  document.querySelectorAll('.nav-char').forEach(n=>n.classList.remove('active'));
  const nav=document.getElementById('nav-'+idx);
  if(nav)nav.classList.add('active');

  const el=document.getElementById('bigLetter');
  el.textContent=key; el.style.animation='none';
  requestAnimationFrame(()=>el.style.animation='');
  document.getElementById('readingBadge').innerHTML=`よみかた：<b>${ch.r}</b>`;
  document.getElementById('wordExample').textContent=ch.w;
  document.getElementById('strokeBadge').textContent=`✏️ ${ch.s.length}かく`;
  document.getElementById('mascot').textContent=MASCOTS[idx%MASCOTS.length];

  animCtx.clearRect(0,0,sz,sz);
  guideCtx.clearRect(0,0,sz,sz);
  drawCtx.clearRect(0,0,sz,sz);
  clearNumDots();
  buildPips(ch.s.length);

  // タブをpracticeに
  document.getElementById('tabWatch').classList.remove('active');
  document.getElementById('tabGuide').classList.remove('active');
  document.getElementById('tabPractice').classList.add('active');
  mode='practice';
  document.getElementById('modeHint').innerHTML=`✨ 「${key}」${ch.s.length}かく！まずみてね…`;
  showBubble(`「${key}」は ${ch.s.length}かく！`,false);

  // 2秒薄いお手本 → ブランク
  drawGuide();
  previewTimer=setTimeout(()=>{
    if(mode==='practice'){
      guideCtx.clearRect(0,0,sz,sz);
      document.getElementById('modeHint').innerHTML='✏️ <b>じぶんで</b> かいてみよう！';
    }
    previewTimer=null;
  },2000);
}

function nextChar(){
  const n=(currentIdx+1)%CHAR_KEYS.length;
  goTo(n);
  const el=document.getElementById('nav-'+n);
  if(el)el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

// ===== カラーパレット =====
function buildColors(){
  const row=document.getElementById('colorRow');
  const label=row.querySelector('span');
  PEN_COLORS.forEach((hex,i)=>{
    const dot=document.createElement('div');
    dot.className='color-dot'+(i===0?' active':'');
    dot.style.background=hex;
    dot.onclick=()=>{
      document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active'));
      dot.classList.add('active');
      currentColor=hex;
      drawCtx.strokeStyle=hex;
    };
    row.insertBefore(dot,label);
  });
}

// ===== ナビ =====
function buildNav(){
  const nav=document.getElementById('navChars');
  CHAR_KEYS.forEach((k,i)=>{
    const el=document.createElement('div');
    el.className='nav-char'+(i===0?' active':'');
    el.id='nav-'+i; el.textContent=k;
    el.onclick=()=>goTo(i);
    nav.appendChild(el);
  });
}

function praise(){
  const msg=PRAISES[Math.floor(Math.random()*PRAISES.length)];
  document.getElementById('hamanaruMsg').textContent=msg;
  document.getElementById('hanamaru').classList.add('show');
  launchPetals();
  doneSet.add(currentIdx);
  document.getElementById('doneCount').textContent=doneSet.size;
  const n=document.getElementById('nav-'+currentIdx);
  if(n)n.classList.add('done');
  setTimeout(closeHanamaru,2200);
}
function closeHanamaru(){document.getElementById('hanamaru').classList.remove('show');}
function launchPetals(){
  const icons=['🌸','🌷','⭐','✨','🎀','💖','🌟'];
  for(let i=0;i<28;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='petal';
      el.textContent=icons[Math.floor(Math.random()*icons.length)];
      el.style.cssText=`left:${Math.random()*100}vw;top:-40px;font-size:${1+Math.random()}rem;animation-duration:${1.4+Math.random()*1.4}s;animation-delay:${Math.random()*0.5}s`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),3500);
    },i*55);
  }
}
function showBubble(msg,good){
  const b=document.getElementById('bubble');
  b.textContent=msg; b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),2800);
  const m=document.getElementById('mascot');
  if(good){m.style.transform='scale(1.3) rotate(-10deg)';setTimeout(()=>m.style.transform='',600);}
}

// ===== 起動 =====
window.addEventListener('load',()=>{
  buildColors(); buildNav(); initCanvases(); goTo(0);
});
window.addEventListener('resize',()=>{
  stopAll();
  const dData=drawCtx.getImageData(0,0,sz,sz);
  initCanvases();
  drawCtx.putImageData(dData,0,0);
  if(mode==='guide') drawGuide();
});
</script>
